name: Convert markdown to HTML and deploy to pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v2
      - name: Set up pandoc
        uses: nikeee/setup-pandoc@v1
      - name: Generate HTML
        run: make all purge-deploy
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: '.'
